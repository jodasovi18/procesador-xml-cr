# Configuración del agente de subida de XML. Copiar a agent.toml y completar.
backend_url = "http://localhost:8000"
usuario = "agente"
clave = "CAMBIAR"
# Alternativa recomendada a usuario/clave: token de agente emitido por el backend
# (POST /api/agent-tokens). Si se define `token`, usuario/clave se ignoran.
# token = "PEGAR-TOKEN-DEL-BACKEND"
# Carpetas a escanear recursivamente buscando .xml:
carpetas = [
  "C:/Users/Usuario/OneDrive/OFICINA/CONTAS/IVA",
]
lote_size = 100
estado_path = "estado.json"
intervalo = 300  # segundos entre pasadas en modo --watch
